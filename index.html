<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Still</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <h1>Meditation Timer</h1>

    <div id="timer" class="timer">10:00</div>

    <div class="controls">
      <button id="startBtn" type="button">Start</button>
      <button id="pauseBtn" type="button">Pause</button>
      <button id="resetBtn" type="button">Reset</button>
    </div>

    <div class="presets">
      <button class="presetBtn" data-seconds="300" type="button">5 min</button>
      <button class="presetBtn" data-seconds="600" type="button">10 min</button>
      <button class="presetBtn" data-seconds="900" type="button">15 min</button>
      <button class="presetBtn" data-seconds="1200" type="button">20 min</button>
      <button class="presetBtn" data-seconds="1800" type="button">30 min</button>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
